name: "CLA Assistant"

on:
  # issue_comment events ONLY trigger from the workflow on the DEFAULT branch.
  # If this file only exists in a PR branch, comment triggers will be silently ignored.
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize, edited]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    if: (github.event.comment.body == 'recheck' || contains(github.event.comment.body, 'I have read the CLA and agree to its terms')) || github.event_name == 'pull_request_target'
    steps:
      - name: "CLA Assistant"
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PAT_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/roshankumar0036singh/auth-server/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'roshankumar0036singh,bot*'
          custom-pr-sign-comment: 'I have read the CLA and agree to its terms.'
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, we need you to sign our [Contributor License Agreement](https://github.com/roshankumar0036singh/auth-server/blob/main/CLA.md).
            <br/>To sign, please post a comment on this PR with the following exact text:
            <br/>`I have read the CLA and agree to its terms`
          custom-allsigned-prcomment: |
            All contributors have signed the CLA. ✅ Thank you!
